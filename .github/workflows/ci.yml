name: CI SpareHub

on:
  push:
    branches: [ "jipel" ]
  pull_request:
    branches: [ "jipel" ]

jobs:
  laravel-phpunit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, dom, curl, libxml, mysql, sqlite, pdo_sqlite, bcmath, gd
        coverage: xdebug

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Execute tests (PHPUnit)
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: ./vendor/bin/phpunit tests/Feature/Generated

  node-api-jest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      working-directory: ./node-api
      run: npm install

    - name: Run Jest tests
      working-directory: ./node-api
      run: npm test || ./node_modules/.bin/jest tests/product.test.js tests/api.test.js tests/integration.test.js

  laravel-dusk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, dom, curl, libxml, sqlite, pdo_sqlite

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Setup Environment
      run: |
        cp .env.example .env
        php artisan key:generate
        touch database/dusk.sqlite

    - name: Install Chrome Driver
      run: php artisan dusk:chrome-driver

    - name: Start Laravel Server
      run: php artisan serve --port=8000 &
      
    - name: Run Dusk Tests
      env:
        APP_URL: http://127.0.0.1:8000
        DB_CONNECTION: sqlite
        DB_DATABASE: database/dusk.sqlite
      run: php artisan dusk
